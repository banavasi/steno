name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: steno-x86_64-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: steno-aarch64-macos
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: steno-x86_64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: steno-x86_64-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - shell: bash
        run: |
          src="target/${{ matrix.target }}/release/steno"
          [ -f "$src.exe" ] && src="$src.exe"
          cp "$src" "${{ matrix.asset }}"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
